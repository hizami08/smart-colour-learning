<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Color Learning Tool</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; margin-bottom: 5px; }
        p { color: #666; font-size: 18px; }
        #webcam-container {
            margin: 20px auto;
            border: 5px solid #333;
            border-radius: 10px;
            width: 320px;
            height: 240px;
            background-color: #ddd;
        }
        #color-output {
            font-size: 48px;
            font-weight: bold;
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            min-width: 200px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h1>Smart Color Learning Tool for Preschoolers 🎨</h1>
    <p>Tekan butang di bawah dan tunjukkan objek berwarna pada kamera!</p>
    
    <button type="button" onclick="init()">Mula Kamera</button>
    
    <div id="webcam-container"></div>
    <div id="color-output">Sila Mula...</div>

    <!-- Load TensorFlow.js dan Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        // ⚠️ TUKAR LINK INI dengan Link Model Teachable Machine anda sendiri!
        const URL = "https://teachablemachine.withgoogle.com/models/pHixBPurP/";

        let model, webcam, labelContainer, maxLabels;

        async function init() {
            document.getElementById("color-output").innerHTML = "Memuatkan Model AI...";
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxLabels = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(320, 240, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            document.getElementById("color-output").innerHTML = "Sedia! Tunjuk Objek";
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            let highestPrediction = { className: "", probability: 0 };
            for (let i = 0; i < maxLabels; i++) {
                if (prediction[i].probability > highestPrediction.probability) {
                    highestPrediction = prediction[i];
                }
            }

            // Jika peratus tekaan AI lebih 85%, papar warna tersebut secara interaktif
            if (highestPrediction.probability > 0.85) {
                const warna = highestPrediction.className.toUpperCase();
                const outputDiv = document.getElementById("color-output");
                outputDiv.innerHTML = warna;

                // Tukar background teks mengikut warna yang dikesan (Mesra Kanak-kanak)
                if (warna === "RED") { outputDiv.style.backgroundColor = "#ff4d4d"; outputDiv.style.color = "white"; }
                else if (warna === "BLUE") { outputDiv.style.backgroundColor = "#4da6ff"; outputDiv.style.color = "white"; }
                else if (warna === "YELLOW") { outputDiv.style.backgroundColor = "#ffff66"; outputDiv.style.color = "black"; }
                else if (warna === "GREEN") { outputDiv.style.backgroundColor = "#5cd65c"; outputDiv.style.color = "white"; }
                else if (warna === "BLACK") { outputDiv.style.backgroundColor = "#333333"; outputDiv.style.color = "white"; }
                else if (warna === "WHITE") { outputDiv.style.backgroundColor = "#ffffff"; outputDiv.style.color = "black"; outputDiv.style.border = "2px solid #333"; }
            }
        }
    </script>
</body>
</html>
