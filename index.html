<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Color Learning Tool</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #333; margin-bottom: 5px; }
        p { color: #666; font-size: 18px; }
        
        /* Kotak Kamera */
        #webcam-container {
            margin: 20px auto;
            border: 5px solid #333;
            border-radius: 10px;
            width: 320px;
            height: 240px;
            background-color: #ddd;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }
        
        /* Kotak Keputusan AI */
        #color-output {
            font-size: 42px;
            font-weight: bold;
            margin: 15px auto;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            min-width: 200px;
            transition: all 0.3s ease;
        }
        
        /* Kontainer Butang di Bahagian Bawah */
        .button-group {
            margin-top: 20px;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 8px;
            transition: background-color 0.2s;
        }
        #start-btn { background-color: #28a745; }
        #start-btn:hover { background-color: #218838; }
        
        #capture-btn { background-color: #007bff; display: none; }
        #capture-btn:hover { background-color: #0069d9; }
        
        #reset-btn { background-color: #dc3545; display: none; }
        #reset-btn:hover { background-color: #c82333; }

        #switch-btn { background-color: #17a2b8; display: none; }
        #switch-btn:hover { background-color: #138496; }
    </style>
</head>
<body>

    <h1>Smart Color Learning Tool for Preschoolers 🎨</h1>
    <p>Show a colored object to the camera, then press "Capture & Analyze"!</p>
    
    <div id="webcam-container"></div>
    
    <div id="color-output">Please Start...</div>
    
    <div class="button-group">
        <button type="button" id="start-btn" class="btn" onclick="init()">Start Camera</button>
        <button type="button" id="capture-btn" class="btn" onclick="captureAndAnalyze()">Capture & Analyze</button>
        <button type="button" id="reset-btn" class="btn" onclick="resetImage()">Reset / Try Again</button>
        <button type="button" id="switch-btn" class="btn" onclick="switchCamera()">🔄 Switch Camera</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/pHixBPurP/";

        let model, webcam, maxLabels;
        let isLooping = true;
        let currentFacingMode = "environment"; // Default kamera belakang untuk telefon

        async function init() {
            document.getElementById("color-output").innerHTML = "Loading AI Model...";
            document.getElementById("start-btn").style.display = "none";
            
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            if (!model) {
                model = await tmImage.load(modelURL, metadataURL);
                maxLabels = model.getTotalClasses();
            }

            await setupWebcam();

            document.getElementById("color-output").innerHTML = "Camera Live! Ready to Capture";
            document.getElementById("capture-btn").style.display = "inline-block";
            document.getElementById("switch-btn").style.display = "inline-block";
        }

        async function setupWebcam() {
            if (webcam) {
                await webcam.stop();
            }

            const flip = (currentFacingMode === "user"); 
            webcam = new tmImage.Webcam(320, 240, flip); 
            
            await webcam.setup({ facingMode: currentFacingMode }); 
            await webcam.play();
            
            isLooping = true;
            window.requestAnimationFrame(loop);

            const container = document.getElementById("webcam-container");
            container.innerHTML = ""; 
            container.appendChild(webcam.canvas);
        }

        async function loop() {
            if (isLooping && webcam) {
                webcam.update(); 
                window.requestAnimationFrame(loop);
            }
        }

        async function switchCamera() {
            if (!webcam) return;
            
            document.getElementById("color-output").innerHTML = "Switching Camera...";
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            
            await setupWebcam();
            document.getElementById("color-output").innerHTML = "Camera Live! Ready to Capture";
        }

        async function captureAndAnalyze() {
            if (!webcam) return;
            
            isLooping = false;
            webcam.pause();
            
            document.getElementById("color-output").innerHTML = "Analyzing...";

            const prediction = await model.predict(webcam.canvas);
            
            let highestPrediction = { className: "", probability: 0 };
            for (let i = 0; i < maxLabels; i++) {
                if (prediction[i].probability > highestPrediction.probability) {
                    highestPrediction = prediction[i];
                }
            }

            const outputDiv = document.getElementById("color-output");
            if (highestPrediction.probability > 0.70) { 
                const color = highestPrediction.className.toUpperCase();
                outputDiv.innerHTML = color;

                if (color === "RED") { outputDiv.style.backgroundColor = "#ff4d4d"; outputDiv.style.color = "white"; outputDiv.style.border = "none"; }
                else if (color === "BLUE") { outputDiv.style.backgroundColor = "#4da6ff"; outputDiv.style.color = "white"; outputDiv.style.border = "none"; }
                else if (color === "YELLOW") { outputDiv.style.backgroundColor = "#ffff66"; outputDiv.style.color = "black"; outputDiv.style.border = "none"; }
                else if (color === "GREEN") { outputDiv.style.backgroundColor = "#5cd65c"; outputDiv.style.color = "white"; outputDiv.style.border = "none"; }
                else if (color === "BLACK") { outputDiv.style.backgroundColor = "#333333"; outputDiv.style.color = "white"; outputDiv.style.border = "none"; }
                else if (color === "WHITE") { outputDiv.style.backgroundColor = "#ffffff"; outputDiv.style.color = "black"; outputDiv.style.border = "2px solid #333"; }
            } else {
                outputDiv.innerHTML = "Not Sure! Try Again";
                outputDiv.style.backgroundColor = "#e2e3e5";
                outputDiv.style.color = "#383d41";
            }
            
            document.getElementById("capture-btn").style.display = "none";
            document.getElementById("switch-btn").style.display = "none";
            document.getElementById("reset-btn").style.display = "inline-block";
        }

        function resetImage() {
            isLooping = true;
            webcam.play(); 
            
            const outputDiv = document.getElementById("color-output");
            outputDiv.innerHTML = "Camera Live! Ready to Capture";
            outputDiv.style.backgroundColor = "transparent";
            outputDiv.style.color = "#333";
            outputDiv.style.border = "none";
            
            document.getElementById("capture-btn").style.display = "inline-block";
            document.getElementById("switch-btn").style.display = "inline-block";
            document.getElementById("reset-btn").style.display = "none";
            
            window.requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
